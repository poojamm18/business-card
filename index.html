<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hindu Vadhu-Varara Mahiti Kendra</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      height: 100vh;
      background: linear-gradient(135deg, #9cb7d1, #9cadc3);
    }

    /* MAIN LAYOUT */
    .container {
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* 70% HERO */
    .top {
      height: 70%;
      position: relative;
      overflow: hidden;
    }

    .banner {
      width: 100%;
      height: 100%;
      object-fit: cover;

      /* 🔥 important */
      object-position: top center;
    }

    /* SUBTLE EDGE FADE */
    .top::after {
      content: "";
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 15px;
      background: linear-gradient(to bottom, transparent, #9cb7d1);
    }

    /* 30% ICON SECTION */
    .bottom {
      height: 30%;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    /* GLASS CARD */
    .glass {
      display: flex;
      gap: 20px;
      padding: 18px 26px;

      border-radius: 25px;
      backdrop-filter: blur(18px);

      background: rgba(255,255,255,0.25);
      border: 1px solid rgba(255,255,255,0.3);

      box-shadow: 0 10px 30px rgba(0,0,0,0.15);

      margin-top: -25px; /* slight overlap */
    }

    /* ICONS */
    .icon {
      width: 55px;
      height: 55px;
      border-radius: 50%;

      display: flex;
      align-items: center;
      justify-content: center;

      color: white;
      font-size: 20px;
      text-decoration: none;

      transition: 0.2s;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .icon:hover {
      transform: translateY(-5px) scale(1.08);
    }

    /* COLORS */
    .whatsapp { background: #22c55e; }
    .instagram { background: #e1306c; }
    .website { background: #3b82f6; }
    .location { background: #16a34a; }
    .call { background: #f97316; }

    /* 🔥 MOBILE OPTIMIZATION */
    @media (max-width: 768px) {

      .icon {
        width: 50px;
        height: 50px;
        font-size: 18px;
      }

      .glass {
        gap: 15px;
        padding: 15px 20px;
        margin-top: -20px;
      }

      .top::after {
        height: 10px;
      }
    }

  </style>
</head>

<body>

  <div class="container">

    <!-- HERO -->
    <div class="top">
      <img src="banner.jpeg" class="banner" alt="Banner">
    </div>

    <!-- ACTIONS -->
    <div class="bottom">
      <div class="glass">

        <a class="icon whatsapp" href="https://wa.me/919483463783" target="_blank">
          <i class="fab fa-whatsapp"></i>
        </a>

        <a class="icon instagram" href="https://www.instagram.com/lokeshaiah.m.aradhya" target="_blank">
          <i class="fab fa-instagram"></i>
        </a>

        <a class="icon website" href="https://www.hindusmatrimony.com" target="_blank">
          <i class="fas fa-globe"></i>
        </a>

        <a class="icon location" href="https://maps.app.goo.gl/P1CcpxmPSRSQUfuD9" target="_blank">
          <i class="fas fa-map-marker-alt"></i>
        </a>

        <a class="icon call" href="tel:7892510652">
          <i class="fas fa-phone"></i>
        </a>

      </div>
    </div>

  </div>

</body>
</html>
