<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hindu Vadhu-Varara Mahiti Kendra</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(180deg, #f5d6e8 0%, #e2c9dc 60%, #f0b4b4 100%);
    }
    
    .top, .bottom {
      background: transparent;
    }
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at center, transparent 60%, rgba(0,0,0,0.08));
    }
    /* MAIN LAYOUT */
    .container {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* HERO */
    .top {
      line-height: 0;
      padding-bottom: 30px; /* spacing under banner */
      border-bottom: 1px solid rgba(0,0,0,0.05);
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      animation: fadeIn 1s ease;
    }

    .top picture {
      display: block;
      width: 100%;
    }

    .banner {
      width: 100%;
      height: auto;
      display: block;
    }

    /* BOTTOM */
    .bottom {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: auto;
      padding: 50px 0 60px;
      animation: fadeUp 1.2s ease;
      
    }
    @media (max-width: 768px) {
      .banner {
        height: auto;
        max-height: 60vh;
        object-fit: cover;
      }
    }
    @media (max-width: 768px) {
      .top {
        padding-bottom: 10px;
      }
    
      .bottom {
        padding: 30px 15px 50px;
      }
    }
    @media (max-width: 768px) {
      .glass {
        padding: 15px 20px;
        gap: 15px;
        border-radius: 20px;
      }
    }
    @media (max-width: 768px) {
      .icon {
        width: 50px;
        height: 50px;
        font-size: 18px;
      }
    }
    @media (max-width: 768px) {
      .cta-text {
        font-size: 16px;
        margin-bottom: 15px;
      }
    }

    /* GLASS */
    .glass {
      display: flex;
      gap: 30px;
      margin: 0 auto;
      position: relative;
      padding: 25px 50px;
      border-radius: 30px;

      background: rgba(255, 255, 255, 0.35);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);

      border: 1px solid rgba(255, 255, 255, 0.4);
      box-shadow:0 20px 50px rgba(0,0,0,0.2),
                0 0 40px rgba(255,255,255,0.3);

      transform: translateY(-20px); /* layering effect */

      animation: popIn 0.8s ease;
    }
    .glass::before {
      content: '';
      opacity: 0.3;
      position: absolute;
      inset: -10px;
      border-radius: 30px;
      background: radial-gradient(circle, rgba(255,255,255,0.4), transparent 70%);
      z-index: -1;
    }

    /* ICONS */
    .icon {
      width: 75px;
      height: 75px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 30px;
      text-decoration: none;
      transition: 0.3s;
      box-shadow: 
        0 8px 20px rgba(0,0,0,0.25),
        inset 0 2px 4px rgba(255,255,255,0.3);

      position: relative;
    }
    .icon:active {
      transform: scale(0.95);
    }
    .icon::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: inherit;
      z-index: -1;
      filter: blur(15px);
      opacity: 0.6;
    }

    .icon:hover {
      transform: translateY(-6px) scale(1.08);
      filter: brightness(1.1);
    }

    .glass:hover .icon {
      opacity: 0.5;
    }

    .glass .icon:hover {
      opacity: 1;
    }
    .icon {
      animation: float 4s ease-in-out infinite;
    }
    
    .icon:nth-child(2) { animation-delay: 0.3s; }
    .icon:nth-child(3) { animation-delay: 0.6s; }
    .icon:nth-child(4) { animation-delay: 0.9s; }
    .icon:nth-child(5) { animation-delay: 1.2s; }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    .cta-text {
      text-align: center;
      font-size: 20px;
      font-weight: 500;
      letter-spacing: 0.5px;
      color: rgba(0,0,0,0.7);
      margin-bottom: 0px;
    }
    
    /* COLORS */
    .whatsapp { background: #1ca84f; }
    .instagram { background: #bf2357; }
    .website { background: #316ecf; }
    .location { background: #148c40; }
    .call { background: #d16112; }

    /* ANIMATIONS */
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(1.02); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes popIn {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    @media (max-width: 768px) {
      .glass {
        backdrop-filter: blur(18px);
      }
    }
    .whatsapp { 
      background: linear-gradient(145deg, #22c55e, #15803d);
    }
    
    .instagram { 
      background: linear-gradient(145deg, #e1306c, #9f1239);
    }
    
    .website { 
      background: linear-gradient(145deg, #3b82f6, #1e3a8a);
    }
    
    .location { 
      background: linear-gradient(145deg, #16a34a, #14532d);
    }
    
    .call { 
      background: linear-gradient(145deg, #f97316, #9a3412);
    }

  </style>
</head>

<body>

  <div class="container">

    <!-- HERO -->
    <div class="top">
      <picture>
        <source media="(max-width: 768px)" srcset="mobile-veiw.png">
        <img src="desktop_banner.jpeg" class="banner" alt="Banner">
      </picture>
    </div>

    <!-- ICONS -->
    <p class="cta-text">Connect with us</p>
    <div class="bottom">
      <div class="glass">

        <a class="icon whatsapp" href="https://wa.me/919483463783" target="_blank">
          <i class="fab fa-whatsapp"></i>
        </a>

        <a class="icon instagram" href="https://www.instagram.com/lokeshaiah.m.aradhya" target="_blank">
          <i class="fab fa-instagram"></i>
        </a>

        <a class="icon website" href="https://www.hindusmatrimony.com" target="_blank">
          <i class="fas fa-globe"></i>
        </a>

        <a class="icon location" href="https://maps.app.goo.gl/P1CcpxmPSRSQUfuD9" target="_blank">
          <i class="fas fa-map-marker-alt"></i>
        </a>

        <a class="icon call" href="tel:7892510652">
          <i class="fas fa-phone"></i>
        </a>

      </div>
    </div>

  </div>

</body>
</html>
