<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hindu Vadhu-Varara Mahiti Kendra</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
    }

    /* MAIN LAYOUT */
    .container {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* HERO SECTION */
    .top {
      flex: 7;
      overflow: hidden;
      line-height: 0; /* ✅ removes white gap */
    }

    .top picture {
      width: 100%;
      height: 100%;
      display: block;
    }

    .banner {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block; /* ✅ removes inline gap */
    }

    /* BOTTOM SECTION */
    .bottom {
      flex: 3;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #f8fafc, #e2e8f0);
    }

    /* GLASS CARD */
    .glass {
      display: flex;
      gap: 20px;
      padding: 20px 30px;
      border-radius: 25px;
      backdrop-filter: blur(15px);
      background: rgba(255,255,255,0.4);
      border: 1px solid rgba(255,255,255,0.3);
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }

    /* ICONS */
    .icon {
      width: 55px;
      height: 55px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 20px;
      text-decoration: none;
      transition: 0.2s;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .icon:hover {
      transform: translateY(-6px) scale(1.1);
    }

    /* COLORS */
    .whatsapp { background: #22c55e; }
    .instagram { background: #e1306c; }
    .website { background: #3b82f6; }
    .location { background: #16a34a; }
    .call { background: #f97316; }

  </style>
</head>

<body>

  <div class="container">

    <!-- HERO -->
    <div class="top">
      <picture>
        <!-- MOBILE -->
        <source media="(max-width: 768px)" srcset="mobile_banner.png">

        <!-- DESKTOP -->
        <img src="desktop_banner.jpeg" class="banner" alt="Banner">
      </picture>
    </div>

    <!-- ICON SECTION -->
    <div class="bottom">
      <div class="glass">

        <a class="icon whatsapp" href="https://wa.me/919483463783" target="_blank">
          <i class="fab fa-whatsapp"></i>
        </a>

        <a class="icon instagram" href="https://www.instagram.com/lokeshaiah.m.aradhya" target="_blank">
          <i class="fab fa-instagram"></i>
        </a>

        <a class="icon website" href="https://www.hindusmatrimony.com" target="_blank">
          <i class="fas fa-globe"></i>
        </a>

        <a class="icon location" href="https://maps.app.goo.gl/P1CcpxmPSRSQUfuD9" target="_blank">
          <i class="fas fa-map-marker-alt"></i>
        </a>

        <a class="icon call" href="tel:7892510652">
          <i class="fas fa-phone"></i>
        </a>

      </div>
    </div>

  </div>

</body>
</html>
