<!DOCTYPE html>
<html>
<head>
  <title>Business Name</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      text-align: center;
      margin: 0;
    }
    .container {
      max-width: 400px;
      margin: auto;
      padding: 20px;
    }
    h1 {
      margin-bottom: 5px;
    }
    p {
      color: #555;
    }
    .btn {
      display: block;
      margin: 12px 0;
      padding: 12px;
      background: #000;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 16px;
    }
    .btn:hover {
      background: #333;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Business Name</h1>
  <p>Your short tagline here</p>

  <a class="btn" href="https://instagram.com/yourpage">Instagram</a>
  <a class="btn" href="https://yourwebsite.com">Website</a>
  <a class="btn" href="https://maps.google.com/...">Location</a>
  <a class="btn" href="tel:1234567890">Call Us</a>
  <a class="btn" href="https://wa.me/91XXXXXXXXXX">WhatsApp</a>

</div>

</body>
</html>
