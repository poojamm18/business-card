<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hindu Vadhu-Varara Mahiti Kendra</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <style>

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(180deg, #f5e3d6 0%, #e8d5c4 60%, #f0c8c8 100%);
      overflow-x: hidden;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at center, transparent 60%, rgba(0,0,0,0.08));
    }

    .container {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .top {
      line-height: 0;
      padding-bottom: 30px;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      animation: fadeIn 1s ease;
    }
    .top::after {
      content: '';
      display: block;
      height: 2px;
      width: 60%;
      margin: 20px auto 0;
      background: linear-gradient(to right, transparent, rgba(0,0,0,0.2), transparent);
    }
    .icon:active {
      transform: scale(0.92);
      filter: brightness(0.9);
    }
    .glass::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 30px;
      background: linear-gradient(120deg, rgba(255,255,255,0.3), transparent);
      pointer-events: none;
    }

    .banner {
      width: 100%;
      height: auto;
      display: block;
    }

    .cta-text {
      text-align: center;
      font-size: 20px;
      font-weight: 500;
      color: rgba(0,0,0,0.7);
      margin-top: 30px;
      margin-bottom: 0px;
    }

    .bottom {
      display: flex;
      justify-content: center;
      padding: 30px 0 50px;
      animation: fadeUp 1.2s ease;
    }
    .bottom {
      position: relative;
    }
    
    .bottom::before {
      content: '';
      position: absolute;
      top: -30px;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      height: 80px;
      background: radial-gradient(circle, rgba(0,0,0,0.08), transparent 70%);
      filter: blur(25px);
      z-index: 0;
    }
    /* GLASS */
    .glass {
      display: flex;
      gap: 30px;
      padding: 18px 22px;
      border-radius: 30px;
      position: relative;
    
          
      background: rgba(255, 255, 255, 0.28);
      backdrop-filter: blur(25px) saturate(160%);
      border: 1px solid rgba(255,255,255,0.6);
    
      box-shadow:
        0 25px 60px rgba(0,0,0,0.25),
        inset 0 1px 1px rgba(255,255,255,0.4);
    
    
      transform: translateY(-20px);
      animation: popIn 0.8s ease;
    }

    .glass::before {
      content: '';
      opacity: 0.3;
      position: absolute;
      inset: -10px;
      border-radius: 30px;
      background: radial-gradient(circle, rgba(255,255,255,0.4), transparent 70%);
      z-index: -1;
    }
    .icon {
      transition: all 0.3s ease;
    }
    
    .icon:hover {
      transform: translateY(-8px) scale(1.12);
      box-shadow:
        0 12px 30px rgba(0,0,0,0.35),
        0 0 25px rgba(255,255,255,0.4);
    }
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 0 rgba(255,255,255,0); }
      50% { box-shadow: 0 0 20px rgba(255,255,255,0.25); }
    }
    
    .icon {
      animation: float 4s ease-in-out infinite, pulseGlow 3s ease-in-out infinite;
    }
    
    /* ROWS (for mobile fix) */
    .row {
      display: contents;
    }

    /* ICONS */
    .icon {
      width: 75px;
      height: 75px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 30px;
      text-decoration: none;
      transition: 0.3s;
      position: relative;

      box-shadow:
        0 8px 20px rgba(0,0,0,0.25),
        inset 0 2px 4px rgba(255,255,255,0.3);

      animation: float 4s ease-in-out infinite;
    }

    .icon:nth-child(2) { animation-delay: 0.3s; }
    .icon:nth-child(3) { animation-delay: 0.6s; }
    .icon:nth-child(4) { animation-delay: 0.9s; }
    .icon:nth-child(5) { animation-delay: 1.2s; }

    .icon::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: inherit;
      z-index: -1;
      filter: blur(15px);
      opacity: 0.6;
    }

    .icon:hover {
      transform: translateY(-6px) scale(1.08);
    }

    .icon:active {
      transform: scale(0.95);
    }

    .glass:hover .icon {
      opacity: 0.5;
    }

    .glass .icon:hover {
      opacity: 1;
    }

    /* COLORS */
    .whatsapp { background: linear-gradient(145deg, #22c55e, #15803d); }
    .instagram { background: linear-gradient(145deg, #e1306c, #9f1239); }
    .website { background: linear-gradient(145deg, #3b82f6, #1e3a8a); }
    .location { background: linear-gradient(145deg, #16a34a, #14532d); }
    .call { background: linear-gradient(145deg, #f97316, #9a3412); }

    /* ANIMATIONS */
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(1.02); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes popIn {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    .cta-text {
      text-align: center;
      font-size: 18px;
      font-weight: 500;
      color: rgba(0,0,0,0.7);
      margin: 15px 0 5px;  /* 🔥 reduced */
    }

    /* 🔥 MOBILE FIX (REAL CENTERING) */
    @media (max-width: 768px) {

      .glass {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 15px;
        padding: 15px;
        max-width: 260px;
        margin: 0 auto;
      }

      .row-top {
        display: flex;
        justify-content: center;   /* ❌ remove space-between */
        gap: 18px;                 /* ✅ control spacing manually */
        width: 100%;
      }

      .row-bottom {
        display: flex;
        justify-content: center;
        gap: 18px;
        width: 100%;
      }

      .icon {
        width: 50px;
        height: 50px;
        font-size: 20px;
      }

    }

  </style>
</head>

<body>

  <div class="container">

    <div class="top">
      <picture>
        <source media="(max-width: 768px)" srcset="mobile-veiw.png">
        <img src="desktop_banner.jpeg" class="banner" alt="Banner">
      </picture>
    </div>

    <p class="cta-text">Connect with us</p>

    <div class="bottom">
      <div class="glass">

        <div class="row row-top">
          <a class="icon whatsapp" href="https://wa.me/919483463783"><i class="fab fa-whatsapp"></i></a>
          <a class="icon instagram" href="https://www.instagram.com/lokeshaiah.m.aradhya"><i class="fab fa-instagram"></i></a>
          <a class="icon website" href="https://www.hindusmatrimony.com"><i class="fas fa-globe"></i></a>
        </div>

        <div class="row row-bottom">
          <a class="icon location" href="https://maps.app.goo.gl/P1CcpxmPSRSQUfuD9"><i class="fas fa-map-marker-alt"></i></a>
          <a class="icon call" href="tel:7892510652"><i class="fas fa-phone"></i></a>
        </div>

      </div>
    </div>

  </div>

</body>
</html>
