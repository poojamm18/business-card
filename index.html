  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;

      /* 🔥 Animated Gradient */
      background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #fbc2eb, #a18cd1);
      background-size: 400% 400%;
      animation: gradientMove 10s ease infinite;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .banner {
      width: 100%;
      display: block;
    }

    .content {
      position: relative;
      max-width: 420px;
      margin: -50px auto 30px;
      padding: 25px 20px;
      text-align: center;

      background: rgba(255, 255, 255, 0.92);
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
    }

    h1 {
      font-size: 22px;
      margin: 15px 0 5px;
      color: #1e293b;
    }

    .subtitle {
      font-size: 14px;
      color: #475569;
    }

    .tagline {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 18px;
    }

    .divider {
      height: 1px;
      background: #e2e8f0;
      margin: 15px 0;
    }

    /* BUTTON */
    .btn {
      position: relative;
      overflow: hidden;

      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;

      margin: 10px auto;
      padding: 14px;
      border-radius: 12px;

      text-decoration: none;
      font-size: 15px;
      font-weight: 600;

      width: 100%;
      max-width: 350px;

      color: white;
      transition: all 0.2s ease;
    }

    /* Tap effect */
    .btn:active {
      transform: scale(0.95);
    }

    /* Ripple */
    .btn::after {
      content: "";
      position: absolute;
      width: 0;
      height: 0;
      background: rgba(255,255,255,0.5);
      border-radius: 50%;
      transform: scale(1);
      opacity: 0;
      pointer-events: none;
    }

    .btn:active::after {
      width: 300px;
      height: 300px;
      opacity: 1;
      transition: 0s;
    }

    /* COLORS */
    .whatsapp {
      background: linear-gradient(45deg, #22c55e, #4ade80);
      animation: pulse 2s infinite;
    }

    .instagram {
      background: linear-gradient(45deg, #f43f5e, #fb7185);
    }

    .website {
      background: linear-gradient(45deg, #3b82f6, #60a5fa);
    }

    .location {
      background: linear-gradient(45deg, #16a34a, #4ade80);
    }

    .call {
      background: linear-gradient(45deg, #f97316, #fb923c);
    }

    /* Pulse */
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(34,197,94,0.5); }
      70% { box-shadow: 0 0 0 12px rgba(34,197,94,0); }
      100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
    }

    .contact {
      font-size: 13px;
      color: #475569;
      margin-top: 12px;
    }

    /* Sticky WhatsApp */
    .sticky-whatsapp {
      position: fixed;
      bottom: 20px;
      right: 20px;

      background: linear-gradient(45deg, #22c55e, #4ade80);
      color: white;

      padding: 14px 16px;
      border-radius: 50px;
      font-size: 18px;

      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      text-decoration: none;

      animation: float 2s infinite ease-in-out;
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

  </style>
</head>
