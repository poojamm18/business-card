<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hindu Vadhu-Varara Mahiti Kendra</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <style>

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(180deg,#f6e7da 0%, #ecd6c3 50%, #e4c7c7 100%);
      overflow-x: hidden;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at center, transparent 60%, rgba(0,0,0,0.08));
    }

    .container {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .top {
      line-height: 0;
      padding-bottom: 30px;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      animation: fadeIn 1s ease;
    }

    .top::after {
      content: '';
      display: block;
      height: 2px;
      width: 60%;
      margin: 20px auto 0;
      background: linear-gradient(to right, transparent, rgba(0,0,0,0.2), transparent);
    }

    .banner {
      width: 100%;
      display: block;
    }

    /* CTA (refined) */
    .cta-text {
      text-align: center;
      font-size: 17px;
      letter-spacing: 1.2px;
      font-weight: 500;
      text-transform: uppercase;
      color: rgba(0,0,0,0.6);
      margin: 18px 0 8px;
      animation: fadeUp 1s ease;
    }

    .bottom {
      display: flex;
      justify-content: center;
      padding: 25px 0 60px;
      animation: fadeUp 1.2s ease;
      position: relative;
    }

    /* subtle ground shadow */
    .bottom::before {
      content: '';
      position: absolute;
      width: 75%;
      height: 140px;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: radial-gradient(
        ellipse at center,
        rgba(255, 255, 255, 0.35),
        rgba(255, 255, 255, 0.15),
        transparent 70%
      );
      filter: blur(35px);
      z-index: 0;
    }

    /* GLASS */
    .glass {
      display: flex;
      gap: 30px;
      padding: 18px 22px;
      border-radius: 30px;
      position: relative;

      background: rgba(255, 248, 240, 0.35);
      backdrop-filter: blur(25px) saturate(160%);
      border: 1px solid rgba(255,255,255,0.6);

      box-shadow:
        0 25px 60px rgba(0,0,0,0.25),
        inset 0 1px 1px rgba(255,255,255,0.4);

      transform: translateY(-20px);
      animation: popIn 0.8s ease;
    }

    .glass::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 30px;
      border: 1px solid rgba(255,255,255,0.5);
      pointer-events: none;
    }

    /* ICONS */
    .icon {
      width: 75px;
      height: 75px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 30px;
      text-decoration: none;
      position: relative;

      transition: transform 0.25s ease, box-shadow 0.25s ease;

      box-shadow:
        0 8px 20px rgba(0,0,0,0.25),
        inset 0 2px 4px rgba(255,255,255,0.3);

      animation: float 4s ease-in-out infinite;
    }

    /* soft highlight */
    .icon::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: linear-gradient(145deg, rgba(255,255,255,0.4), transparent);
    }

    .icon::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: inherit;
      filter: blur(15px);
      opacity: 0.5;
      z-index: -1;
    }

    .icon:hover {
      transform: translateY(-8px) scale(1.1);
      box-shadow:
        0 15px 35px rgba(0,0,0,0.35),
        0 0 20px rgba(255,255,255,0.3);
    }

    .icon:active {
      transform: scale(0.9);
    }

    .glass .icon {
      opacity: 1;
    }
    
    /* only when hovering inside AND NOT the hovered icon */
    .glass:hover .icon:not(:hover) {
      opacity: 0.4;
      transform: scale(0.95);
    }
    
    /* hovered icon stays sharp */
    .glass .icon:hover {
      opacity: 1;
    }

    /* COLORS */
    .whatsapp { background: linear-gradient(145deg, #22c55e, #15803d); }
    .instagram { background: linear-gradient(145deg, #e1306c, #9f1239); }
    .website { background: linear-gradient(145deg, #3b82f6, #1e3a8a); }
    .location { background: linear-gradient(145deg, #16a34a, #14532d); }
    .call { background: linear-gradient(145deg, #f97316, #9a3412); }

    /* ROWS */
    .row { display: contents; }

    /* ANIMATIONS */
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(1.02); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes popIn {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    /* MOBILE */
    @media (max-width: 768px) {

      .glass {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 15px;
        padding: 15px;
        max-width: 260px;
        margin: 0 auto;
        backdrop-filter: blur(18px) saturate(140%);
      }

      .row-top,
      .row-bottom {
        display: flex;
        justify-content: center;
        gap: 18px;
        width: 100%;
      }

      .icon {
        width: 50px;
        height: 50px;
        font-size: 20px;
        box-shadow:
          0 6px 15px rgba(0,0,0,0.25),
          inset 0 2px 3px rgba(255,255,255,0.25);
      }

      .cta-text {
        font-size: 16px;
        letter-spacing: 0.5px;
      }

      .bottom::before {
        height: 100px;
        width: 85%;
        opacity: 0.7;
      }
    }

  </style>
</head>

<body>

  <div class="container">

    <div class="top">
      <picture>
        <source media="(max-width: 768px)" srcset="mobile-veiw.png">
        <img src="desktop_banner.jpeg" class="banner" alt="Banner">
      </picture>
    </div>

    <p class="cta-text">Contact & Connect</p>

    <div class="bottom">
      <div class="glass">

        <div class="row row-top">
          <a class="icon whatsapp" href="https://wa.me/919483463783"><i class="fab fa-whatsapp"></i></a>
          <a class="icon instagram" href="https://www.instagram.com/lokeshaiah.m.aradhya"><i class="fab fa-instagram"></i></a>
          <a class="icon website" href="https://www.hindusmatrimony.com"><i class="fas fa-globe"></i></a>
        </div>

        <div class="row row-bottom">
          <a class="icon location" href="https://maps.app.goo.gl/P1CcpxmPSRSQUfuD9"><i class="fas fa-map-marker-alt"></i></a>
          <a class="icon call" href="tel:7892510652"><i class="fas fa-phone"></i></a>
        </div>

      </div>
    </div>

  </div>

</body>
</html>
